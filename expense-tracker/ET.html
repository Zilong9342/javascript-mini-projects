<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="ET.css">
</head>

<body>
    <div class="container">
        <h2>Expense Tracker</h2>
    
        <div class="chart-container">
            <canvas id="expenseChart"></canvas>
        </div>

        <div class="input-section">
            <input type="text" id="description" placeholder="What did you buy?">
            <input type="number" id="amount" placeholder="Amount ($)">
            <select id="category">
                <option value="Food">Food</option>
                <option value="Rent">Rent</option>
                <option value="Fun">Fun</option>
                <option value="Tech">Tech</option>
            </select>
            <button id="addExpense">Add Expense</button>
        </div>
        
        <div class="history-section">
            <h3>Recent Expenses</h3>
            <ul id="expenseList"></ul>
            <button id="clearAllBtn" class="secondary-btn">Clear All Data</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="ET.js"></script>
</body>
</html>
